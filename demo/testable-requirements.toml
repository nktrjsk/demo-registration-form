[[requirement]]
id = "AI-043"
parent = "REQ-007"
description = "A non-admin user can still PUT /internal/meeting/{id}/my-entry with only project_entries (no \"attending\" key) and the request succeeds (200); attendance remains at whatever the admin last set it to (default False)."
