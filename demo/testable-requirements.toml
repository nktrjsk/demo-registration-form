[[requirement]]
id = "REQ-001"
parent = ""
description = "The automation is named 'Demo meeting form'."
status = "pass"

[[requirement]]
id = "REQ-002"
parent = ""
description = "There is a single meeting type, 'Demo', with a configurable schedule. Default is Monday 15:00. An admin can change the weekday and start time."
status = "pass"

[[requirement]]
id = "REQ-003"
parent = ""
description = "On the demo day a new Demo meeting instance is automatically created at 00:00 local time (midnight at the start of that day)."
status = "pass"

[[requirement]]
id = "REQ-004"
parent = ""
description = "The internal-frontend uses OIDC to identify the signed-in user by email and presents them a form for the current Demo meeting where they can record one or more projects they worked on and a free-text description for each project. Attendance is set by an admin only (see REQ-007) and shown to the user as a read-only status."
status = "pass"

[[requirement]]
id = "REQ-005"
parent = ""
description = "The attendee roster auto-grows: any OIDC user who has ever signed in appears in the attendee list for current and future meetings."
status = "pass"

[[requirement]]
id = "REQ-006"
parent = ""
description = "Any signed-in user can add a new project (with a leader name) to the global project catalog; the project then becomes available for entries on any current or future meeting."
status = "pass"

[[requirement]]
id = "REQ-007"
parent = ""
description = "Attendance is admin-only: only an admin can mark or change a user's attendance. Each user can create/edit their own project entries; an admin can edit any user's entries and can change schedule and other settings."
status = "pass"

[[requirement]]
id = "REQ-008"
parent = ""
description = "There is a separate 'History' tab in the internal-frontend that lists past Demo meetings; opening a past meeting shows its attendees and per-project notes read-only (layout may differ from the live form)."
status = "pass"

[[requirement]]
id = "AI-009"
parent = "REQ-001"
description = "The internal-frontend displays 'Demo meeting form' as the visible application title/header."
status = "pass"

[[requirement]]
id = "AI-010"
parent = "REQ-002"
description = "A freshly-deployed automation has its Demo meeting schedule set to Monday 15:00 by default."
status = "pass"

[[requirement]]
id = "AI-011"
parent = "REQ-002"
description = "An admin can change the weekday of future demos via the admin settings UI, and the change persists across reloads and backend restarts."
status = "pass"

[[requirement]]
id = "AI-012"
parent = "REQ-002"
description = "An admin can change the start time of future demos via the admin settings UI, and the change persists across reloads and backend restarts."
status = "pass"

[[requirement]]
id = "AI-013"
parent = "REQ-002"
description = "A non-admin user is rejected (UI hidden and API returns 403) when attempting to change the schedule."
status = "pass"

[[requirement]]
id = "AI-014"
parent = "REQ-003"
