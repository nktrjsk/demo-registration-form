[[requirement]]
id = "REQ-001"
parent = ""
description = "The automation is named 'Demo meeting form'."
status = "pending"

[[requirement]]
id = "REQ-002"
parent = ""
description = "There is a single meeting type, 'Demo', with a configurable schedule. Default is Monday 15:00. An admin can change the weekday and start time."
status = "pending"

[[requirement]]
id = "REQ-003"
parent = ""
description = "On the demo day a new Demo meeting instance is automatically created at 00:00 local time (midnight at the start of that day)."
status = "pending"

[[requirement]]
id = "REQ-004"
parent = ""
description = "The internal-frontend uses OIDC to identify the signed-in user by email and presents them a form for the current Demo meeting where they can record (a) their own attendance, (b) one or more projects they worked on, and (c) a free-text description for each project."
status = "pending"

[[requirement]]
id = "REQ-005"
parent = ""
description = "The attendee roster auto-grows: any OIDC user who has ever signed in appears in the attendee list for current and future meetings."
status = "pending"

[[requirement]]
id = "REQ-006"
parent = ""
description = "Any signed-in user can add a new project (with a leader name) to the current Demo meeting; the project then appears for everyone to log entries under."
status = "pending"

[[requirement]]
id = "REQ-007"
parent = ""
description = "Each user can only create/edit their own attendance and their own project entries. An admin role can edit any user's attendance and entries, and can change schedule and other settings."
status = "pending"

[[requirement]]
id = "REQ-008"
parent = ""
description = "There is a separate 'History' tab in the internal-frontend that lists past Demo meetings; opening a past meeting shows its attendees and per-project notes read-only (layout may differ from the live form)."
status = "pending"

[[requirement]]
id = "AI-009"
parent = "REQ-001"
description = "The internal-frontend displays 'Demo meeting form' as the visible application title/header."
status = "pending"

[[requirement]]
id = "AI-010"
parent = "REQ-002"
description = "A freshly-deployed automation has its Demo meeting schedule set to Monday 15:00 by default."
status = "pending"

[[requirement]]
id = "AI-011"
parent = "REQ-002"
description = "An admin can change the weekday of future demos via the admin settings UI, and the change persists across reloads and backend restarts."
status = "pending"

[[requirement]]
id = "AI-012"
parent = "REQ-002"
description = "An admin can change the start time of future demos via the admin settings UI, and the change persists across reloads and backend restarts."
status = "pending"

[[requirement]]
id = "AI-013"
parent = "REQ-002"
description = "A non-admin user is rejected (UI hidden and API returns 403) when attempting to change the schedule."
status = "pending"

[[requirement]]
id = "AI-014"
parent = "REQ-003"
description = "At 00:00 local time on the configured demo weekday, a new Demo meeting instance is created in the database with that date as its meeting date."
status = "pending"

[[requirement]]
id = "AI-015"
parent = "REQ-003"
description = "The auto-create job is idempotent: running it twice on the same demo day does not produce duplicate meeting instances."
status = "pending"

[[requirement]]
id = "AI-016"
parent = "REQ-003"
description = "If the admin changes the demo weekday, the next auto-created instance occurs at 00:00 on the new weekday (not the old one)."
status = "pending"

[[requirement]]
id = "AI-017"
parent = "REQ-004"
description = "When a signed-in user opens the internal-frontend form, their email is preloaded from the OIDC session and not editable as free text."
status = "pending"

[[requirement]]
id = "AI-018"
parent = "REQ-004"
description = "The form has a control letting the user mark themselves as attending or not attending the current Demo meeting."
status = "pending"

[[requirement]]
id = "AI-019"
parent = "REQ-004"
description = "The form lets the user select one or more projects from the current meeting's project list."
status = "pending"

[[requirement]]
id = "AI-020"
parent = "REQ-004"
description = "For each project the user selects, they can write a free-text description; descriptions are stored per project per user."
status = "pending"

[[requirement]]
id = "AI-021"
parent = "REQ-004"
description = "Submitting the form persists the entry; reopening the form for the same meeting shows the user's previously submitted values."
status = "pending"

[[requirement]]
id = "AI-022"
parent = "REQ-005"
description = "A user logging in via OIDC for the first time is added to the roster and appears in the attendee list of the current and all future Demo meetings."
status = "pending"

[[requirement]]
id = "AI-023"
parent = "REQ-005"
description = "A user appears at most once in the attendee roster, regardless of how many times they have logged in."
status = "pending"

[[requirement]]
id = "AI-024"
parent = "REQ-005"
description = "A user whose email is referenced elsewhere but who has never authenticated via OIDC does NOT appear in the roster automatically."
status = "pending"

[[requirement]]
id = "AI-025"
parent = "REQ-006"
description = "Any signed-in user can submit a new project (with project name and leader name) to the current Demo meeting."
status = "pending"

[[requirement]]
id = "AI-026"
parent = "REQ-006"
